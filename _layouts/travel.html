<!DOCTYPE html>
<html>

{% include head.html %}

<style>
body { margin: 0; background: #0B0B0F; overflow: hidden; }

#travel-page {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding-top: 3.25em;
  box-sizing: border-box;
}

.tp-header {
  padding: 12px 60px 6px;
  flex-shrink: 0;
}
.tp-eyebrow {
  display: block;
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: #5E6AD2; margin-bottom: 12px;
}
.tp-title {
  font-family: 'Inter', sans-serif !important;
  font-size: clamp(26px, 3.5vw, 44px) !important;
  font-weight: 700 !important; letter-spacing: -0.03em !important;
  line-height: 1.1 !important; color: #fff !important;
  margin: 0 0 8px !important; border: none !important;
}
.tp-title::after { display: none !important; }
.tp-sub {
  font-size: 12px; color: rgba(255,255,255,0.3);
  font-family: 'Inter', sans-serif;
}

#globe-travel {
  flex: 1;
  width: 100%;
  overflow: hidden;
  cursor: grab;
}
#globe-travel:active { cursor: grabbing; }

@media (max-width: 736px) {
  .tp-header { padding: 24px 24px 14px; }
}
</style>

<body>

{% include header.html %}

<div id="travel-page">
  <div class="tp-header">
    <span class="tp-eyebrow">Places I've Been</span>
    <h1 class="tp-title">The world,<br>one city at a time.</h1>
    <p class="tp-sub">Drag to rotate &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Hover for city details</p>
  </div>
  <div id="globe-travel"></div>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
(function () {
  var container = document.getElementById('globe-travel');
  if (!container || typeof THREE === 'undefined') return;

  var W = container.offsetWidth, H = container.offsetHeight || 500;

  var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);
  container.appendChild(renderer.domElement);

  var scene  = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(40, W / H, 0.1, 100);
  var camZ = 4.8;  /* start fully zoomed out */
  camera.position.set(0, 0.08, camZ);

  var globeGroup = new THREE.Group();
  scene.add(globeGroup);

  var R       = 1;
  var earthMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  globeGroup.add(new THREE.Mesh(new THREE.SphereGeometry(R, 64, 64), earthMat));

  new THREE.TextureLoader().load(
    '//unpkg.com/three-globe/example/img/earth-blue-marble.jpg',
    function (t) { earthMat.map = t; earthMat.needsUpdate = true; }
  );

  scene.add(new THREE.AmbientLight(0xffffff, 1.8));
  var sun = new THREE.DirectionalLight(0xffffff, 0.5);
  sun.position.set(5, 3, 5);
  scene.add(sun);

  function ll2v(lat, lng, r) {
    var phi = (90 - lat) * Math.PI / 180, theta = (lng + 180) * Math.PI / 180;
    return new THREE.Vector3(
      -r * Math.sin(phi) * Math.cos(theta),
       r * Math.cos(phi),
       r * Math.sin(phi) * Math.sin(theta)
    );
  }

  var places = [
    { city: 'Nagpur',       flag: '🇮🇳', lat:  21.146, lng:  79.088 },
    { city: 'Mumbai',       flag: '🇮🇳', lat:  19.076, lng:  72.877 },
    { city: 'Melbourne',    flag: '🇦🇺', lat: -37.814, lng: 144.946, photo: '/assets/images/unimelb.png', url: '/travel/melbourne' },
    { city: 'Tokyo',        flag: '🇯🇵', lat:  35.682, lng: 139.691 },
    { city: 'Doha',         flag: '🇶🇦', lat:  25.285, lng:  51.531 },
    { city: 'Reykjavik',    flag: '🇮🇸', lat:  64.135, lng: -21.895 },
    { city: 'Narvik',       flag: '🇳🇴', lat:  68.438, lng:  17.427 },
    { city: 'Stockholm',    flag: '🇸🇪', lat:  59.329, lng:  18.068 },
    { city: 'Aarhus',       flag: '🇩🇰', lat:  56.157, lng:  10.210 },
    { city: 'Amsterdam',    flag: '🇳🇱', lat:  52.377, lng:   4.897 },
    { city: 'Warsaw',       flag: '🇵🇱', lat:  52.229, lng:  21.012 },
    { city: 'Brussels',     flag: '🇧🇪', lat:  50.850, lng:   4.352 },
    { city: 'Luxembourg',   flag: '🇱🇺', lat:  49.611, lng:   6.131 },
    { city: 'Prague',       flag: '🇨🇿', lat:  50.075, lng:  14.437 },
    { city: 'Zurich',       flag: '🇨🇭', lat:  47.376, lng:   8.541 },
    { city: 'Munich',       flag: '🇩🇪', lat:  48.137, lng:  11.576 },
    { city: 'Vienna',       flag: '🇦🇹', lat:  48.208, lng:  16.373 },
    { city: 'Štúrovo',      flag: '🇸🇰', lat:  47.800, lng:  18.717 },
    { city: 'Budapest',     flag: '🇭🇺', lat:  47.498, lng:  19.040 },
    { city: 'Zagreb',       flag: '🇭🇷', lat:  45.813, lng:  15.978 },
    { city: 'Barcelona',    flag: '🇪🇸', lat:  41.385, lng:   2.173 },
    { city: 'Rome',         flag: '🇮🇹', lat:  41.902, lng:  12.496 },
    { city: 'Vatican City', flag: '🇻🇦', lat:  41.903, lng:  12.453 },
    { city: 'Tirana',       flag: '🇦🇱', lat:  41.328, lng:  19.818 },
    { city: 'Santorini',    flag: '🇬🇷', lat:  36.393, lng:  25.461 },
  ];

  var dotMeshes = [];
  var dotGeo    = new THREE.SphereGeometry(0.022, 12, 12);
  places.forEach(function (p) {
    var pos = ll2v(p.lat, p.lng, R + 0.012);
    var dot = new THREE.Mesh(dotGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
    dot.position.copy(pos); dot.userData = p;
    globeGroup.add(dot); dotMeshes.push(dot);
    var ring = new THREE.Mesh(
      new THREE.RingGeometry(0.030, 0.046, 28),
      new THREE.MeshBasicMaterial({ color: 0x7B8FE8, side: THREE.DoubleSide, transparent: true, opacity: 0.75 })
    );
    ring.position.copy(pos); ring.lookAt(0, 0, 0);
    globeGroup.add(ring);
  });

  var ARC_SEGS = 80;
  function addArc(pa, pb) {
    var v0 = ll2v(pa.lat, pa.lng, 1).normalize();
    var v1 = ll2v(pb.lat, pb.lng, 1).normalize();
    var pts = [];
    for (var i = 0; i <= ARC_SEGS; i++) {
      var t = i / ARC_SEGS;
      pts.push(v0.clone().lerp(v1, t).normalize().multiplyScalar(R + 0.015 + 0.1 * Math.sin(Math.PI * t)));
    }
    globeGroup.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color: 0x7B8FE8, transparent: true, opacity: 0.55 })
    ));
  }
  for (var i = 0; i < places.length - 1; i++) addArc(places[i], places[i + 1]);

  /* City card tooltip */
  var tip = document.createElement('div');
  tip.style.cssText = [
    'position:fixed;z-index:9999;pointer-events:none;display:none;',
    'background:rgba(11,11,15,0.96);color:#fff;',
    'font-family:Inter,sans-serif;border-radius:12px;',
    'border:1px solid rgba(94,106,210,0.35);',
    'box-shadow:0 8px 40px rgba(0,0,0,0.55);',
    'overflow:hidden;width:220px;',
    'transition:opacity 0.15s ease;'
  ].join('');
  document.body.appendChild(tip);

  var currentHit = null;

  var rc = new THREE.Raycaster(), mouse2 = new THREE.Vector2();
  renderer.domElement.addEventListener('pointermove', function (e) {
    if (isDragging) { tip.style.display = 'none'; currentHit = null; return; }
    var rect = renderer.domElement.getBoundingClientRect();
    mouse2.set(((e.clientX - rect.left) / rect.width) * 2 - 1,
              -((e.clientY - rect.top)  / rect.height) * 2 + 1);
    rc.setFromCamera(mouse2, camera);
    var hits = rc.intersectObjects(dotMeshes);
    if (hits.length) {
      var d = hits[0].object.userData;
      if (d !== currentHit) {
        currentHit = d;
        if (d.photo) {
          tip.innerHTML =
            '<img src="' + d.photo + '" style="width:100%;height:130px;object-fit:cover;display:block;">' +
            '<div style="padding:10px 14px 12px;">' +
              '<span style="font-size:18px;vertical-align:middle;">' + d.flag + '</span>' +
              '<strong style="margin-left:8px;font-size:14px;vertical-align:middle;">' + d.city + '</strong>' +
              (d.url ? '<div style="margin-top:6px;font-size:11px;color:#5E6AD2;letter-spacing:0.05em;">Click to read more →</div>' : '') +
            '</div>';
        } else {
          tip.innerHTML =
            '<div style="padding:10px 14px;">' +
              '<span style="font-size:18px;vertical-align:middle;">' + d.flag + '</span>' +
              '<strong style="margin-left:8px;font-size:13px;vertical-align:middle;">' + d.city + '</strong>' +
            '</div>';
        }
      }
      tip.style.display = 'block';
      var cx = e.clientX + 18, cy = e.clientY - 20;
      if (cx + 220 > window.innerWidth)  cx = e.clientX - 234;
      if (cy + 200 > window.innerHeight) cy = e.clientY - 210;
      tip.style.left = cx + 'px';
      tip.style.top  = cy + 'px';
      renderer.domElement.style.cursor = d.url ? 'pointer' : 'default';
    } else {
      tip.style.display = 'none';
      currentHit = null;
      renderer.domElement.style.cursor = isDragging ? 'grabbing' : 'grab';
    }
  });
  renderer.domElement.addEventListener('pointerleave', function () { tip.style.display = 'none'; currentHit = null; });

  /* Click — navigate if city has a url */
  renderer.domElement.addEventListener('click', function (e) {
    if (isDragging) return;
    var rect = renderer.domElement.getBoundingClientRect();
    mouse2.set(((e.clientX - rect.left) / rect.width) * 2 - 1,
              -((e.clientY - rect.top)  / rect.height) * 2 + 1);
    rc.setFromCamera(mouse2, camera);
    var hits = rc.intersectObjects(dotMeshes);
    if (hits.length && hits[0].object.userData.url) {
      window.location.href = hits[0].object.userData.url;
    }
  });

  /* Drag rotation — no zoom, no scroll capture */
  var isDragging = false, lastPX = 0, lastPY = 0;
  var rotX = 0.42, rotY = -0.48;
  var velX = 0, velY = 0.0018;

  renderer.domElement.style.cursor = 'grab';

  renderer.domElement.addEventListener('pointerdown', function (e) {
    isDragging = true; lastPX = e.clientX; lastPY = e.clientY;
    velX = 0; velY = 0;
    renderer.domElement.style.cursor = 'grabbing';
    renderer.domElement.setPointerCapture(e.pointerId);
  });
  renderer.domElement.addEventListener('pointermove', function (e) {
    if (!isDragging) return;
    velY = (e.clientX - lastPX) * 0.012;
    velX = (e.clientY - lastPY) * 0.012;
    rotY += velY; rotX = Math.max(-1.1, Math.min(1.1, rotX + velX));
    lastPX = e.clientX; lastPY = e.clientY;
  });
  renderer.domElement.addEventListener('pointerup',    function () { isDragging = false; renderer.domElement.style.cursor = 'grab'; });
  renderer.domElement.addEventListener('pointerleave', function () { isDragging = false; renderer.domElement.style.cursor = 'grab'; });

  /* Scroll / wheel zoom */
  var targetCamZ = camZ;
  renderer.domElement.addEventListener('wheel', function (e) {
    e.preventDefault();
    targetCamZ = Math.max(1.6, Math.min(7.0, targetCamZ + e.deltaY * 0.004));
  }, { passive: false });

  /* Pinch zoom on touch */
  var lastPinchDist = null;
  renderer.domElement.addEventListener('touchstart', function (e) {
    if (e.touches.length === 2) lastPinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY);
  }, { passive: true });
  renderer.domElement.addEventListener('touchmove', function (e) {
    if (e.touches.length !== 2 || lastPinchDist === null) return;
    var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                       e.touches[0].clientY - e.touches[1].clientY);
    targetCamZ = Math.max(1.6, Math.min(7.0, targetCamZ - (d - lastPinchDist) * 0.012));
    lastPinchDist = d;
  }, { passive: true });

  window.addEventListener('resize', function () {
    W = container.offsetWidth; H = container.offsetHeight || 500;
    camera.aspect = W / H; camera.updateProjectionMatrix(); renderer.setSize(W, H);
  });

  function animate() {
    requestAnimationFrame(animate);
    if (!isDragging) {
      velY += (0.0018 - velY) * 0.008;
      velX *= 0.88;
    }
    rotY += velY; rotX = Math.max(-1.1, Math.min(1.1, rotX + velX));
    globeGroup.rotation.set(rotX, rotY, 0);
    /* smooth zoom */
    camZ += (targetCamZ - camZ) * 0.10;
    camera.position.setZ(camZ);
    renderer.render(scene, camera);
  }
  animate();
})();
</script>

</body>
</html>
