<!DOCTYPE html>
<html>
{% include head.html %}

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0B0B0F;
  font-family: 'Inter', -apple-system, sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
}

/* Ambient background */
#sq-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
}
#sq-bg::before {
  content: '';
  position: absolute;
  width: 700px; height: 700px; border-radius: 50%;
  background: radial-gradient(circle, rgba(94,106,210,0.09) 0%, transparent 65%);
  top: 50%; left: 50%; transform: translate(-50%, -60%);
}
#sq-bg::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(139,92,246,0.06) 0%, transparent 65%);
  bottom: 10%; right: 10%;
}

/* Card / Placard */
#sq-card {
  position: relative; z-index: 1;
  width: min(560px, 92vw);
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 48px 44px 44px;
  box-shadow:
    0 0 0 1px rgba(94,106,210,0.12),
    0 32px 80px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.08);
  animation: card-in 0.7s cubic-bezier(0.22,1,0.36,1) both;
  display: flex; flex-direction: column;
}

@keyframes card-in {
  from { opacity: 0; transform: translateY(32px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0)    scale(1); }
}

/* Decorative corner accents */
#sq-card::before, #sq-card::after {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  border-color: rgba(94,106,210,0.5);
  border-style: solid;
}
#sq-card::before {
  top: 14px; left: 14px;
  border-width: 2px 0 0 2px;
  border-radius: 4px 0 0 0;
}
#sq-card::after {
  bottom: 14px; right: 14px;
  border-width: 0 2px 2px 0;
  border-radius: 0 0 4px 0;
}

/* Header row */
.sq-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 32px;
}
.sq-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.25em; text-transform: uppercase;
  color: #5E6AD2;
}
.sq-diff {
  display: flex; gap: 3px;
}
.sq-diff span {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,0.12);
}
.sq-diff span.lit { background: #5E6AD2; }

/* Category badge */
.sq-category {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(94,106,210,0.1);
  border: 1px solid rgba(94,106,210,0.25);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px; font-weight: 500;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.03em;
  margin-bottom: 20px;
  align-self: flex-start;
}

/* Quest emoji */
.sq-emoji {
  font-size: 52px; line-height: 1;
  display: block; margin-bottom: 16px;
  animation: emoji-bounce 0.5s cubic-bezier(0.22,1,0.36,1) 0.35s both;
}
@keyframes emoji-bounce {
  from { transform: scale(0.5) rotate(-15deg); opacity: 0; }
  to   { transform: scale(1)   rotate(0deg);   opacity: 1; }
}

/* Quest text */
.sq-quest {
  font-size: clamp(20px, 4vw, 26px);
  font-weight: 700;
  color: #fff;
  line-height: 1.3;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
}

/* Flavour text */
.sq-flavour {
  font-size: 13px;
  color: rgba(255,255,255,0.38);
  line-height: 1.7;
  margin-bottom: 36px;
  flex: 1;
}

/* New Quest button — bottom, full width, centered text */
#sq-reroll {
  width: 100%;
  background: #5E6AD2;
  border: none; border-radius: 10px;
  color: #fff; font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 600;
  padding: 14px 20px;
  cursor: pointer;
  transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  letter-spacing: -0.01em;
  text-align: center;
}
#sq-reroll:hover {
  background: #4f5bbf;
  box-shadow: 0 8px 24px rgba(94,106,210,0.4);
  transform: translateY(-1px);
}
#sq-reroll:active { transform: translateY(0); }

/* Back link */
#sq-back {
  position: fixed; top: 24px; left: 28px; z-index: 10;
  color: rgba(255,255,255,0.35);
  font-size: 13px; font-weight: 500;
  text-decoration: none;
  display: flex; align-items: center; gap: 6px;
  transition: color 0.2s;
}
#sq-back:hover { color: rgba(255,255,255,0.75); }
</style>

<body>

<a id="sq-back" href="/">← Home</a>

<div id="sq-bg"></div>

<div id="sq-card">
  <div class="sq-header">
    <span class="sq-label">⚔ Side Quest</span>
    <div class="sq-diff" id="sq-diff"></div>
  </div>

  <div class="sq-category" id="sq-category"></div>
  <span class="sq-emoji" id="sq-emoji"></span>
  <h2 class="sq-quest" id="sq-quest"></h2>
  <p class="sq-flavour" id="sq-flavour"></p>

  <button id="sq-reroll">🎲 &nbsp;New Quest</button>
</div>

<script>
var QUESTS = [
  // ── Social / tiny risks ──────────────────────────────────────────────────
  { emoji:'💬', cat:'Social', diff:1, quest:'Compliment a stranger on something specific — their jacket, their dog, their laugh.', flavour:'Make it genuine, not generic. "Nice shoes" is fine. "That colour looks great on you" lands differently.' },
  { emoji:'🙋', cat:'Social', diff:1, quest:'Strike up a conversation with someone waiting in the same queue as you.', flavour:'Comment on the wait, the weather, anything. You only need one sentence to get it started.' },
  { emoji:'☕', cat:'Social', diff:1, quest:'Ask the barista how their day is actually going — and listen to the answer.', flavour:'They\'re trained to ask you. Flip it. Most people light up when someone asks them first.' },
  { emoji:'📞', cat:'Social', diff:1, quest:'Call (not text) someone you haven\'t spoken to in over a year.', flavour:'No agenda. Just "hey, I was thinking about you." That\'s the whole script.' },
  { emoji:'😄', cat:'Social', diff:1, quest:'Make eye contact and smile at five strangers today. Count them.', flavour:'It\'s small, it\'s free, and it shifts the whole energy of your day.' },
  { emoji:'✉️', cat:'Social', diff:1, quest:'Send a voice note to a friend instead of a text message.', flavour:'Voice notes feel more human. Your tone, your laugh — they\'re all in there.' },
  { emoji:'🤝', cat:'Social', diff:2, quest:'Introduce yourself to a neighbour you\'ve never properly met.', flavour:'You share a wall/hallway/street. You might as well know each other\'s names.' },
  { emoji:'🎂', cat:'Social', diff:1, quest:'Text someone "thinking of you" today — no reason, no context, just that.', flavour:'It takes 5 seconds to send and will probably make their whole afternoon.' },
  { emoji:'🫂', cat:'Social', diff:2, quest:'Tell someone in your life something you appreciate about them — out loud, not over text.', flavour:'Pick one thing, be specific. "I really appreciate how you always..." is a full sentence.' },
  { emoji:'👥', cat:'Social', diff:2, quest:'Invite yourself to something. Ask a friend what they\'re doing this weekend and just join.', flavour:'People rarely say no when you ask directly. The awkward part only exists in your head.' },
  { emoji:'🗣️', cat:'Social', diff:2, quest:'Start a conversation with someone at a café, gym, or park who\'s alone and looks approachable.', flavour:'One line is all you need. The rest follows if it\'s meant to.' },
  { emoji:'🧑‍🍳', cat:'Social', diff:2, quest:'Cook something and drop it off for a friend or colleague unexpectedly.', flavour:'Food is one of the oldest ways humans say "I care about you." Use it.' },
  { emoji:'💌', cat:'Social', diff:1, quest:'Write a genuine thank-you message to someone who helped you this year — even for something small.', flavour:'People do things and never hear back. Close that loop.' },
  { emoji:'🎤', cat:'Social', diff:3, quest:'Share an opinion you\'d normally keep to yourself in a group conversation.', flavour:'Not aggressively — just honestly. Saying what you actually think is a skill that needs practice.' },
  { emoji:'🆕', cat:'Social', diff:3, quest:'Find something happening in your city tonight — a gig, quiz night, open mic — and go alone.', flavour:'Arrive, get a drink, and find one person to talk to. That\'s the only goal. Everything else is a bonus.' },
  { emoji:'🙏', cat:'Social', diff:2, quest:'Apologise to someone you\'ve been meaning to, but kept putting off.', flavour:'It doesn\'t have to be big. "Hey, I was a bit short with you last time — sorry about that." Done.' },
  { emoji:'💡', cat:'Social', diff:2, quest:'Ask someone older than you for advice on something you\'re genuinely figuring out.', flavour:'People with experience love to share it. You get wisdom; they feel valued. Win-win.' },
  { emoji:'🎁', cat:'Social', diff:1, quest:'Buy a small gift for someone with no occasion whatsoever.', flavour:'A book they\'d like, a chocolate bar, a postcard. The randomness is the point.' },
  { emoji:'📖', cat:'Social', diff:1, quest:'Recommend a book, film, or album to someone and tell them exactly why you loved it.', flavour:'Sharing something you love is a form of vulnerability. It\'s also how people bond.' },
  { emoji:'👋', cat:'Social', diff:1, quest:'Learn the name of someone you see regularly but have never properly introduced yourself to.', flavour:'The delivery person, the security guard, the person at the corner shop. Names matter.' },
  { emoji:'🌍', cat:'Social', diff:2, quest:'Ask someone from a different country or culture to teach you one thing about where they\'re from.', flavour:'A dish, a tradition, a word. People love sharing their culture when asked with genuine curiosity.' },
  { emoji:'🎯', cat:'Social', diff:3, quest:'Share something personal in a conversation today — something you\'d normally keep to yourself.', flavour:'Vulnerability isn\'t weakness. It\'s how people actually connect past the surface level.' },
  { emoji:'🧩', cat:'Social', diff:2, quest:'Organise something small — a walk, a dinner, a movie night — and just send the invite without overthinking it.', flavour:'Stop waiting for someone else to plan it. You be the person who makes things happen.' },
  { emoji:'🤲', cat:'Social', diff:1, quest:'Help someone with something today without being asked and without expecting anything back.', flavour:'Hold the door longer. Carry something. Google something for someone. Just quietly do it.' },
  // ── Adventure / small risks ──────────────────────────────────────────────
  { emoji:'🚌', cat:'Adventure', diff:2, quest:'Get on a bus you\'ve never taken, ride to the end of the line, and explore for an hour.', flavour:'No map, no plan. Just go and figure it out when you get there.' },
  { emoji:'🌅', cat:'Adventure', diff:1, quest:'Go outside today and watch the sunset from wherever you are — no phone for the last 5 minutes of it.', flavour:'You\'ve walked past a hundred sunsets while looking at a screen. This one you actually watch.' },
  { emoji:'🍽️', cat:'Adventure', diff:1, quest:'Walk into a restaurant you\'ve never tried, sit at the bar if there is one, and order whatever the chef recommends.', flavour:'Take the option off your plate. Let someone else decide for once.' },
  { emoji:'🎭', cat:'Adventure', diff:3, quest:'Go to a live event — music, comedy, theatre — alone and fully commit to enjoying it.', flavour:'Solo nights out are underrated. You pay attention differently when there\'s no one to perform for.' },
  { emoji:'🏊', cat:'Adventure', diff:3, quest:'Find an open-water spot and get in, even if it\'s cold.', flavour:'Cold water swimming is the fastest legal way to feel fully alive. Just do it.' },
  { emoji:'📸', cat:'Creative', diff:1, quest:'Spend 30 minutes photographing your neighbourhood like a tourist seeing it for the first time.', flavour:'You stop noticing what\'s around you. This forces you to look again.' },
  { emoji:'🌿', cat:'Slow Living', diff:1, quest:'Find a park bench, sit for 20 minutes, and do nothing — no phone, no podcast.', flavour:'Doing nothing is a skill. And your nervous system is craving it.' },
  { emoji:'🚴', cat:'Adventure', diff:2, quest:'Rent a bike and go somewhere you\'ve only ever passed by in a car or on public transport.', flavour:'Everything is slower and better from a bike. Take the long way back.' },
  { emoji:'🧗', cat:'Adventure', diff:3, quest:'Find a climbing gym, martial arts studio, or rowing club near you and walk in today — most offer same-day trial sessions.', flavour:'Don\'t book in advance or you\'ll overthink it. Just show up and say "can I try a session today?"' },
  { emoji:'🌮', cat:'Slow Living', diff:1, quest:'Cook a dish from a country you\'ve never visited, from scratch.', flavour:'Bonus if the recipe is in another language and you have to translate it.' },
  { emoji:'🔭', cat:'Slow Living', diff:1, quest:'Go somewhere dark tonight and stargaze for 20 minutes without your phone.', flavour:'Let your eyes adjust for 10 minutes first. You\'ll be shocked by what you see.' },
];

var current = null;

function getQuest() {
  var q;
  do { q = QUESTS[Math.floor(Math.random() * QUESTS.length)]; } while (q === current);
  return q;
}

function renderQuest(q) {
  current = q;
  var card = document.getElementById('sq-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = '';

  document.getElementById('sq-emoji').textContent   = q.emoji;
  document.getElementById('sq-quest').textContent   = q.quest;
  document.getElementById('sq-flavour').textContent = q.flavour;
  document.getElementById('sq-category').textContent = q.cat;

  var dots = document.getElementById('sq-diff');
  dots.innerHTML = '';
  for (var i = 1; i <= 3; i++) {
    var s = document.createElement('span');
    if (i <= q.diff) s.classList.add('lit');
    dots.appendChild(s);
  }

  var em = document.getElementById('sq-emoji');
  em.style.animation = 'none';
  void em.offsetWidth;
  em.style.animation = '';
}

document.getElementById('sq-reroll').addEventListener('click', function() {
  renderQuest(getQuest());
});

renderQuest(getQuest());
</script>

{% include page-transition.html %}
</body>
</html>
