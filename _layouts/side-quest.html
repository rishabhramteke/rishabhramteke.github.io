<!DOCTYPE html>
<html>
{% include head.html %}

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0B0B0F;
  font-family: 'Inter', -apple-system, sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
}

/* Ambient background */
#sq-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
}
#sq-bg::before {
  content: '';
  position: absolute;
  width: 700px; height: 700px; border-radius: 50%;
  background: radial-gradient(circle, rgba(94,106,210,0.09) 0%, transparent 65%);
  top: 50%; left: 50%; transform: translate(-50%, -60%);
}
#sq-bg::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(139,92,246,0.06) 0%, transparent 65%);
  bottom: 10%; right: 10%;
}

/* Card / Placard */
#sq-card {
  position: relative; z-index: 1;
  width: min(560px, 92vw);
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 48px 44px 40px;
  box-shadow:
    0 0 0 1px rgba(94,106,210,0.12),
    0 32px 80px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.08);
  animation: card-in 0.7s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes card-in {
  from { opacity: 0; transform: translateY(32px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0)    scale(1); }
}

/* Decorative corner accents */
#sq-card::before, #sq-card::after {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  border-color: rgba(94,106,210,0.5);
  border-style: solid;
}
#sq-card::before {
  top: 14px; left: 14px;
  border-width: 2px 0 0 2px;
  border-radius: 4px 0 0 0;
}
#sq-card::after {
  bottom: 14px; right: 14px;
  border-width: 0 2px 2px 0;
  border-radius: 0 0 4px 0;
}

/* Header row */
.sq-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 32px;
}
.sq-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.25em; text-transform: uppercase;
  color: #5E6AD2;
}
.sq-diff {
  display: flex; gap: 3px;
}
.sq-diff span {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,0.12);
}
.sq-diff span.lit { background: #5E6AD2; }

/* Category badge */
.sq-category {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(94,106,210,0.1);
  border: 1px solid rgba(94,106,210,0.25);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px; font-weight: 500;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.03em;
  margin-bottom: 20px;
}

/* Quest emoji */
.sq-emoji {
  font-size: 52px; line-height: 1;
  display: block; margin-bottom: 16px;
  animation: emoji-bounce 0.5s cubic-bezier(0.22,1,0.36,1) 0.35s both;
}
@keyframes emoji-bounce {
  from { transform: scale(0.5) rotate(-15deg); opacity: 0; }
  to   { transform: scale(1)   rotate(0deg);   opacity: 1; }
}

/* Quest text */
.sq-quest {
  font-size: clamp(20px, 4vw, 26px);
  font-weight: 700;
  color: #fff;
  line-height: 1.3;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
}

/* Flavour text */
.sq-flavour {
  font-size: 13px;
  color: rgba(255,255,255,0.38);
  line-height: 1.7;
  margin-bottom: 32px;
}

/* Reward */
.sq-reward {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px;
  color: rgba(255,255,255,0.3);
  margin-bottom: 32px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.sq-reward strong { color: rgba(255,255,255,0.6); }

/* Buttons */
.sq-actions { display: flex; gap: 12px; }

#sq-reroll {
  flex: 1;
  background: #5E6AD2;
  border: none; border-radius: 10px;
  color: #fff; font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 600;
  padding: 13px 20px;
  cursor: pointer;
  transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  letter-spacing: -0.01em;
}
#sq-reroll:hover {
  background: #4f5bbf;
  box-shadow: 0 8px 24px rgba(94,106,210,0.4);
  transform: translateY(-1px);
}
#sq-reroll:active { transform: translateY(0); }

#sq-share {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: rgba(255,255,255,0.5);
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 500;
  padding: 13px 18px;
  cursor: pointer;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}
#sq-share:hover {
  background: rgba(255,255,255,0.08);
  color: #fff;
  border-color: rgba(255,255,255,0.2);
}

/* Back link */
#sq-back {
  position: fixed; top: 24px; left: 28px; z-index: 10;
  color: rgba(255,255,255,0.35);
  font-size: 13px; font-weight: 500;
  text-decoration: none;
  display: flex; align-items: center; gap: 6px;
  transition: color 0.2s;
}
#sq-back:hover { color: rgba(255,255,255,0.75); }

/* Copied toast */
#sq-toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  background: rgba(94,106,210,0.15);
  border: 1px solid rgba(94,106,210,0.35);
  border-radius: 8px; padding: 10px 18px;
  font-size: 13px; color: rgba(255,255,255,0.75);
  font-family: 'Inter', sans-serif;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
#sq-toast.show { opacity: 1; }
</style>

<body>

<a id="sq-back" href="/">← Home</a>

<div id="sq-bg"></div>

<div id="sq-card">
  <div class="sq-header">
    <span class="sq-label">⚔ Side Quest</span>
    <div class="sq-diff" id="sq-diff"></div>
  </div>

  <div class="sq-category" id="sq-category"></div>
  <span class="sq-emoji" id="sq-emoji"></span>
  <h2 class="sq-quest" id="sq-quest"></h2>
  <p class="sq-flavour" id="sq-flavour"></p>

  <div class="sq-reward">
    <span>🏆</span>
    <span>Reward: <strong id="sq-reward"></strong></span>
  </div>

  <div class="sq-actions">
    <button id="sq-reroll">🎲 &nbsp;New Quest</button>
    <button id="sq-share">Copy &amp; Share</button>
  </div>
</div>

<div id="sq-toast">Copied to clipboard ✓</div>

<script>
var QUESTS = [
  { emoji:'☕', cat:'Slow Living', diff:1, quest:'Find a café you\'ve never been to and sit alone for an hour — no phone, just a drink and a notebook.', flavour:'Watch the world go by. You\'ll be surprised what your brain does when you give it space.', reward:'Inner peace + a new favourite spot' },
  { emoji:'🌅', cat:'Adventure', diff:1, quest:'Wake up before sunrise and walk to the nearest high point to watch the city wake up.', flavour:'The world looks completely different at 5am. It\'s worth losing one hour of sleep.', reward:'Golden hour clarity' },
  { emoji:'🎲', cat:'Social', diff:2, quest:'Invite someone you\'ve been meaning to catch up with for months. No excuses this time.', flavour:'That person has probably been thinking the same thing. One of you has to send the message.', reward:'A good conversation you\'ll remember' },
  { emoji:'🍜', cat:'Food', diff:1, quest:'Cook a dish from a country you\'ve never visited, from scratch, no shortcuts.', flavour:'Bonus points if the recipe is in another language and you have to Google translate it.', reward:'New recipe in your arsenal + a good story' },
  { emoji:'📸', cat:'Creative', diff:2, quest:'Spend one hour in your city photographing only things that are the colour blue.', flavour:'Constraints are the best creative fuel. You\'ll start seeing the world differently within 10 minutes.', reward:'A photography series worth keeping' },
  { emoji:'🚂', cat:'Adventure', diff:2, quest:'Get on a random train or bus and ride to the last stop. Explore for two hours, then come back.', flavour:'The destination doesn\'t matter. The point is to go somewhere with no plan and figure it out.', reward:'+50 spontaneity XP' },
  { emoji:'📚', cat:'Learning', diff:1, quest:'Learn five phrases in a language you know nothing about and use one on a real person today.', flavour:'It doesn\'t matter if you botch it. People love when you try in their language.', reward:'A smile from a stranger' },
  { emoji:'🌿', cat:'Outdoors', diff:1, quest:'Find a park you\'ve never sat in and spend 30 minutes doing absolutely nothing.', flavour:'Not scrolling, not listening to anything. Just existing. It\'s harder than it sounds.', reward:'Nervous system reset' },
  { emoji:'🎨', cat:'Creative', diff:2, quest:'Buy a cheap sketchbook and draw your view from the window for 20 minutes. Any skill level counts.', flavour:'Art isn\'t about talent. It\'s about paying attention to what you see.', reward:'A new creative outlet' },
  { emoji:'🏊', cat:'Adventure', diff:3, quest:'Find an open-water swimming spot and take the plunge — cold water and all.', flavour:'Cold water swimming is the fastest legal way to feel fully alive. Do it.', reward:'Bragging rights + an endorphin flood' },
  { emoji:'🌮', cat:'Food', diff:1, quest:'Order something from a restaurant menu you\'ve never tried and have no idea what it is.', flavour:'Let the waiter describe it. If it sounds weird, that\'s a good sign.', reward:'Either a new favourite food or a great story' },
  { emoji:'🎭', cat:'Social', diff:3, quest:'Go to a comedy show, open-mic night, or live jazz bar alone.', flavour:'Solo nights out teach you how to be comfortable in your own company. It\'s a superpower.', reward:'Confidence +20' },
  { emoji:'🔭', cat:'Outdoors', diff:2, quest:'Find the darkest spot near your city tonight and stargaze for 30 minutes.', flavour:'No app, just eyes. Let them adjust for 10 minutes first. You\'ll be shocked what you see.', reward:'Existential perspective (the good kind)' },
  { emoji:'✉️', cat:'Slow Living', diff:1, quest:'Write a physical letter to someone you care about and actually send it.', flavour:'Handwritten letters take effort, and people feel that. This will mean more than any text.', reward:'Warmed heart (theirs and yours)' },
  { emoji:'🧗', cat:'Adventure', diff:3, quest:'Try a physical activity you\'ve always thought wasn\'t for you — climbing, martial arts, rowing.', flavour:'First classes are always free or cheap. The hardest part is booking it.', reward:'A new obsession (probably)' },
  { emoji:'🎵', cat:'Creative', diff:1, quest:'Make a playlist of 10 songs that defined each year of the last decade of your life.', flavour:'It\'s basically an autobiography in 10 songs. Then share it with one person.', reward:'A time capsule you\'ll revisit forever' },
  { emoji:'🏛️', cat:'Culture', diff:1, quest:'Visit a museum or gallery in your city that you\'ve never been to, even if it seems boring.', flavour:'The "boring" ones are often the most surprising. History museums especially.', reward:'Local bragging rights + actual knowledge' },
  { emoji:'🌍', cat:'Adventure', diff:3, quest:'Book a one-way ticket somewhere within 4 hours\' travel time and figure out the return later.', flavour:'You\'ve done more complicated things at work on a Monday morning.', reward:'A story worth telling at every dinner party' },
  { emoji:'🧘', cat:'Slow Living', diff:1, quest:'Do a 20-minute guided meditation. First time if possible. See what happens.', flavour:'If your brain won\'t stop, that\'s fine. That\'s the point. Just observe it.', reward:'Mental clarity + a skill that compounds' },
  { emoji:'🍷', cat:'Social', diff:2, quest:'Host a dinner for 4 people with no plan — just cook whatever\'s in your fridge and improvise.', flavour:'The best dinner parties aren\'t the planned ones. The chaos is the fun.', reward:'A core memory for everyone there' },
  { emoji:'🚴', cat:'Outdoors', diff:2, quest:'Rent a bike and cycle to a destination at least 10km away. Take the scenic route back.', flavour:'Everything looks better from a bike. Cities, villages, coastlines — all of it.', reward:'Sore legs + a dopamine spike' },
  { emoji:'📖', cat:'Learning', diff:1, quest:'Read 50 pages of a book you\'ve had on your list for over 6 months tonight.', flavour:'You\'ll remember why you wanted to read it in the first place. Then you won\'t be able to stop.', reward:'Finally finishing something you started' },
  { emoji:'🎬', cat:'Culture', diff:1, quest:'Watch a foreign-language film — no dubbed version — from a country you\'ve visited.', flavour:'You\'ll catch words you didn\'t know you learned. And the filmmaking is always better in the original.', reward:'A new director to obsess over' },
  { emoji:'🌱', cat:'Slow Living', diff:1, quest:'Buy one plant and keep it alive for a month. Start there.', flavour:'It\'s surprisingly grounding to be responsible for something living. Even a cactus counts.', reward:'Greenery in your space + a sense of responsibility' },
  { emoji:'🤝', cat:'Social', diff:2, quest:'Do something genuinely kind for a stranger today — pay for their coffee, help with directions, carry something.', flavour:'Random acts of kindness hit different when you do them with zero expectation of acknowledgment.', reward:'A mood boost that lasts all day' },
  { emoji:'🎯', cat:'Learning', diff:2, quest:'Learn one new skill for 30 minutes a day for 7 days straight — pick something completely useless to your career.', flavour:'Juggling, lock-picking, bird ID, origami. The point is the learning, not the skill.', reward:'+1 interesting fact about yourself' },
  { emoji:'🏖️', cat:'Adventure', diff:2, quest:'Take a day trip to the nearest body of water and stay until sunset.', flavour:'Water changes your brain chemistry. This is not a metaphor. Go sit near some.', reward:'Rest that actually feels like rest' },
  { emoji:'🌆', cat:'Creative', diff:1, quest:'Walk a route in your city you\'ve never taken and narrate it like a travel documentary in your head.', flavour:'Suddenly the kebab shop on the corner has "a rich history dating back to 2009."', reward:'Renewed love for where you live' },
  { emoji:'🎤', cat:'Social', diff:3, quest:'Go to a karaoke night and sing at least one song — alone or with others, doesn\'t matter.', flavour:'Confidence isn\'t about being good. It\'s about doing things badly and not caring.', reward:'A legendary night regardless of outcome' },
  { emoji:'🧩', cat:'Slow Living', diff:1, quest:'Do a 500-piece puzzle over a weekend with no pressure to finish it fast.', flavour:'It\'s one of the most meditative things you can do with your hands. Old wisdom.', reward:'Patience +10, anxiety -10' },
];

var current = null;

function getQuest() {
  var q;
  do { q = QUESTS[Math.floor(Math.random() * QUESTS.length)]; } while (q === current);
  return q;
}

function renderQuest(q) {
  current = q;
  // restart card animation
  var card = document.getElementById('sq-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = '';

  document.getElementById('sq-emoji').textContent   = q.emoji;
  document.getElementById('sq-quest').textContent   = q.quest;
  document.getElementById('sq-flavour').textContent = q.flavour;
  document.getElementById('sq-reward').textContent  = q.reward;
  document.getElementById('sq-category').textContent = q.cat;

  var dots = document.getElementById('sq-diff');
  dots.innerHTML = '';
  for (var i = 1; i <= 3; i++) {
    var s = document.createElement('span');
    if (i <= q.diff) s.classList.add('lit');
    dots.appendChild(s);
  }

  // re-trigger emoji animation
  var em = document.getElementById('sq-emoji');
  em.style.animation = 'none';
  void em.offsetWidth;
  em.style.animation = '';
}

document.getElementById('sq-reroll').addEventListener('click', function() {
  renderQuest(getQuest());
});

document.getElementById('sq-share').addEventListener('click', function() {
  var text = '⚔️ Side Quest: ' + current.quest + '\n\nReward: ' + current.reward + '\n\nrishabhramteke.github.io/side-quest';
  navigator.clipboard.writeText(text).then(function() {
    var t = document.getElementById('sq-toast');
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2200);
  });
});

renderQuest(getQuest());
</script>

{% include page-transition.html %}
</body>
</html>
